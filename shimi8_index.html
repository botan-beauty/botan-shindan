  const share = () => {
    if (navigator.share) {
      navigator.share({ title, text });
    } else {
      navigator.clipboard.writeText(text);
      alert("テキストをコピーしました！");
    }
  };

    <button onClick={share} style={{ display: "block", width: "100%", padding: "14px", background: "linear-gradient(135deg,#e07aaa,#c05070)", color: "#fff", border: "none", borderRadius: 99, fontSize: 15, fontWeight: 700, cursor: "pointer", marginTop: 12, fontFamily: "sans-serif" }}>
