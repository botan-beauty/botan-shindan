var state = { step:0, shimis:[], zubora:null, nouhi:null };
var STEPS = ['シミ','ズボラ','脳疲労','確認','結果'];

function updateSteps() {
  var html = '';
  for(var i=0;i<STEPS.length;i++){
    html += '<div class="step-dot'+(i<=state.step?' active':'')+'">'+( i+1)+'</div>';
    if(i<STEPS.length-1) html += '<div class="step-line'+(i<state.step?' active':'')+'"></div>';
  }
  document.getElementById('steps').innerHTML = html;
}

function render() {
  updateSteps();
  var c = document.getElementById('content');
  var html = '';

  if(state.step===0) {
    html = '<div class="card">';
    html += '<div style="font-size:16px;font-weight:800;color:#c05070;margin-bottom:3px">🩷 シミ・くすみのタイプは？</div>';
    html += '<div style="font-size:12px;color:#906070;margin-bottom:5px">当てはまるタイプを選んでください（最大2つ）</div>';
    html += '<div class="hidden-info">🧠 ✨ 下の2つは隠れタイプです</div>';
    Object.keys(SHIMI_DATA).forEach(function(id){
      var t = SHIMI_DATA[id];
      var sel = state.shimis.indexOf(id)>=0;
      var dis = state.shimis.length>=2 && !sel;
      var cls = 'type-btn'+(sel?' selected':'')+(t.hidden&&!sel?' hidden-type':'')+(dis?' disabled':'');
      html += '<button class="'+cls+'" onclick="toggleShimi(\''+id+'\')">';
      html += '<span style="margin-right:8px;font-size:18px">'+t.emoji+'</span>'+t.name;
      if(t.hidden&&!sel) html += '<span class="hidden-badge">隠れ</span>';
      html += '<div class="type-tag">'+t.tag+'</div></button>';
    });
    if(state.shimis.length>0) html += '<div class="select-count">選択中：'+state.shimis.length+'/2</div>';
    html += '</div>';
    if(state.shimis.length>0) html += '<button class="btn-next" onclick="nextStep()">次へ →</button>';
  }

  else if(state.step===1) {
    html = '<div class="card">';
    html += '<div style="font-size:16px;font-weight:800;color:#c05070;margin-bottom:3px">🌿 ズボラ美容タイプは？</div>';
    html += '<div style="font-size:12px;color:#906070;margin-bottom:12px">診断結果を選んでください</div>';
    Object.keys(ZUBORA_DATA).forEach(function(id){
      var t = ZUBORA_DATA[id];
      var sel = state.zubora===id;
      html += '<button class="type-btn'+(sel?' selected':'')+'" onclick="setZubora(\''+id+'\')">';
      html += '<span style="margin-right:8px;font-size:18px">'+t.emoji+'</span>'+t.name;
      html += '<div class="type-tag">'+t.tag+'</div></button>';
    });
    html += '</div>';
    html += '<div class="btn-row">';
    html += '<button class="btn-back" style="flex:1" onclick="prevStep()">← 戻る</button>';
    if(state.zubora) html += '<button class="btn-next" style="flex:2;margin-top:0" onclick="nextStep()">次へ →</button>';
    html += '</div>';
  }

  else if(state.step===2) {
    html = '<div class="card">';
    html += '<div style="font-size:16px;font-weight:800;color:#c05070;margin-bottom:3px">🧠 脳疲労タイプは？</div>';
    html += '<div style="font-size:12px;color:#906070;margin-bottom:12px">診断結果を選んでください</div>';
    Object.keys(NOUHI_DATA).forEach(function(id){
      var t = NOUHI_DATA[id];
      var sel = state.nouhi===id;
      html += '<button class="type-btn'+(sel?' selected':'')+'" onclick="setNouhi(\''+id+'\')">';
      html += '<span style="margin-right:8px;font-size:18px">'+t.emoji+'</span>'+t.name;
      html += '<div class="type-tag">'+t.tag+'</div></button>';
    });
    html += '</div>';
    html += '<div class="btn-row">';
    html += '<button class="btn-back" style="flex:1" onclick="prevStep()">← 戻る</button>';
    if(state.nouhi) html += '<button class="btn-next" style="flex:2;margin-top:0" onclick="nextStep()">確認する →</button>';
    html += '</div>';
  }

  else if(state.step===3) {
    var sDs = state.shimis.map(function(id){return SHIMI_DATA[id];});
    var zD = ZUBORA_DATA[state.zubora];
    var nD = NOUHI_DATA[state.nouhi];
    html = '<div class="card card-special" style="text-align:center">';
    html += '<div style="font-size:13px;color:#b07080;margin-bottom:10px">この組み合わせで作ります</div>';
    sDs.concat([zD,nD]).forEach(function(t){
      html += '<div class="confirm-tag"><span style="font-size:20px">'+t.emoji+'</span><div><div class="confirm-tag-name">'+t.name+'</div><div class="confirm-tag-sub">'+t.tag+'</div></div></div>';
    });
    html += '</div>';
    html += '<button class="btn-next" onclick="nextStep()">✨ アドバイスシートを見る</button>';
    html += '<button class="btn-back" onclick="prevStep()">← 戻る</button>';
  }

  else if(state.step===4) {
    var sDs = state.shimis.map(function(id){return SHIMI_DATA[id];});
    var zD = ZUBORA_DATA[state.zubora];
    var nD = NOUHI_DATA[state.nouhi];
    var typeName = getTypeName(state.shimis, state.zubora, state.nouhi);
    var catchCopy = getCatch(state.shimis, state.zubora, state.nouhi);
    var s0 = sDs[0];

    var allPersonality = [];
    sDs.forEach(function(s){s.personality.forEach(function(p){if(allPersonality.indexOf(p)<0)allPersonality.push(p);});});
    zD.personality.slice(0,2).forEach(function(p){if(allPersonality.indexOf(p)<0)allPersonality.push(p);});
    nD.personality.slice(0,2).forEach(function(p){if(allPersonality.indexOf(p)<0)allPersonality.push(p);});

    var allThinking = [];
    sDs.forEach(function(s){s.thinking.forEach(function(t){if(allThinking.indexOf(t)<0)allThinking.push(t);});});
    zD.thinking.slice(0,1).forEach(function(t){if(allThinking.indexOf(t)<0)allThinking.push(t);});
    nD.thinking.slice(0,1).forEach(function(t){if(allThinking.indexOf(t)<0)allThinking.push(t);});

    var allSkin = [];
    sDs.forEach(function(s){s.skin.forEach(function(sk){if(allSkin.indexOf(sk)<0)allSkin.push(sk);});});

    // 1&2: 表紙+総合タイプ
    html += '<div class="card card-special" style="text-align:center">';
    html += '<div class="cover-title">あなた専用</div>';
    html += '<div class="cover-h1">肌と心の取扱説明書</div>';
    html += '<div style="margin-bottom:12px">';
    sDs.concat([zD,nD]).forEach(function(t){html += '<span class="badge">'+t.emoji+' '+t.name+'</span>';});
    html += '</div>';
    html += '<div class="type-name-box"><div class="label">あなたの総合タイプ</div>';
    html += '<div class="name">「'+typeName+'」</div>';
    html += '<div class="catch">'+catchCopy+'</div></div></div>';

    // 3: 特徴
    html += '<div class="card"><div class="section-title">あなたの特徴</div>';
    html += '<div class="sub-label">🌿 性格傾向</div>';
    allPersonality.slice(0,6).forEach(function(p){html += '<div class="item">・'+p+'</div>';});
    html += '<div class="sub-label">🧠 思考のクセ</div>';
    allThinking.slice(0,4).forEach(function(t){html += '<div class="item">・'+t+'</div>';});
    html += '<div class="sub-label">🩷 肌の特徴</div>';
    allSkin.slice(0,5).forEach(function(s){html += '<div class="item">・'+s+'</div>';});
    html += '</div>';

    // 4: 負のループ
    html += '<div class="card"><div class="section-title purple">起こりやすい負のループ</div>';
    html += '<div style="display:flex;flex-direction:column;align-items:center;gap:3px">';
    s0.loop.forEach(function(l,i){
      html += '<div class="loop-box">'+l+'</div>';
      if(i<s0.loop.length-1) html += '<div class="loop-arrow">↓</div>';
    });
    html += '<div class="loop-note">'+nD.loop_note+'</div></div></div>';

    // 5: 最優先
    html += '<div class="card"><div class="section-title">🌟 今のあなたに最優先のこと</div>';
    s0.priority.forEach(function(p,i){
      html += '<div class="priority-row"><div class="priority-num">'+(i+1)+'</div><div class="priority-text">'+p+'</div></div>';
    });
    html += '</div>';

    // 6: シミタイプ詳細
    sDs.forEach(function(s){
      html += '<div class="card"><div class="section-title">'+s.emoji+' '+s.name+'の詳細</div>';
      html += '<div style="font-size:13px;color:#b07080;margin-bottom:6px;text-align:center;font-style:italic">肌からのサイン：'+s.signal+'</div>';
      html += '<div class="detail-box" style="color:#5a2030">'+s.skin_detail+'</div>';
      html += '<div class="sub-label">起こりやすい悩み</div>';
      s.concerns.forEach(function(c){html += '<div class="item">・'+c+'</div>';});
      html += '<div class="sub-label">推奨成分</div>';
      s.ingredients.forEach(function(ing){html += '<div class="item">・'+ing+'</div>';});
      html += '<div class="sub-label">ぼたん流おすすめケア</div>';
      s.cares.forEach(function(care){html += '<div class="item">・'+care+'</div>';});
      html += '<div class="detail-note" style="margin-top:8px">'+s.spot_msg+'</div></div>';
    });

    // 7: ズボラタイプ詳細
    html += '<div class="card"><div class="section-title green">'+zD.emoji+' '+zD.name+'の詳細</div>';
    html += '<div class="sub-label">このタイプの特徴</div>';
    zD.features.forEach(function(f){html += '<div class="item-green">・'+f+'</div>';});
    html += '<div style="font-size:13px;font-weight:800;color:#70a080;margin:10px 0 5px">あなたに必要なのは</div>';
    html += '<div style="font-size:15px;font-weight:900;color:#508060;margin-bottom:5px">'+zD.keyword+'</div>';
    html += '<div style="font-size:13px;color:#304030;line-height:1.8;margin-bottom:8px">'+zD.desc+'</div>';
    html += '<div class="sub-label">続けやすい工夫</div>';
    zD.tips.forEach(function(t){html += '<div class="item-green">・'+t+'</div>';});
    html += '<div class="detail-note-green" style="margin-top:8px">'+zD.msg+'</div></div>';

    // 8: 脳疲労タイプ詳細
    html += '<div class="card"><div class="section-title purple">'+nD.emoji+' '+nD.name+'の詳細</div>';
    html += '<div class="sub-label">このタイプの特徴</div>';
    nD.features.forEach(function(f){html += '<div class="item-purple">・'+f+'</div>';});
    html += '<div class="sub-label">肌に出やすいサイン</div>';
    nD.skin_signs.forEach(function(s){html += '<div class="item-purple">・'+s+'</div>';});
    html += '<div class="sub-label">脳を整える行動</div>';
    nD.actions.forEach(function(a){html += '<div class="item-purple">・'+a+'</div>';});
    html += '<div class="detail-note-purple" style="margin-top:8px">'+nD.msg+'</div></div>';

    // 9: 朝のルーティン
    html += '<div class="card"><div class="section-title green">☀️ 朝のルーティン</div>';
    s0.morning.forEach(function(r,i){html += '<div class="item-green">'+(i+1)+'. '+r+'</div>';});
    html += '</div>';

    // 10: 夜のルーティン
    html += '<div class="card"><div class="section-title purple">🌙 夜のルーティン</div>';
    s0.night.forEach(function(r,i){html += '<div class="item-purple">'+(i+1)+'. '+r+'</div>';});
    html += '</div>';

    // 11: 食事・生活習慣
    html += '<div class="card"><div class="section-title brown">🍽 食事・生活習慣</div>';
    s0.lifestyle.forEach(function(l){html += '<div class="item-brown">・'+l+'</div>';});
    html += '</div>';

    // 12: 自分にかけたい言葉
    html += '<div class="card card-word"><div class="section-title" style="text-align:left">自分にかけたい言葉</div>';
    s0.self_words.forEach(function(w){html += '<div class="self-words">・'+w+'</div>';});
    html += '</div>';

    // 13: 1か月実践プラン
    html += '<div class="card"><div class="section-title">📅 1か月実践プラン</div>';
    s0.plan.forEach(function(p,i){
      html += '<div class="week-row"><div class="week-label">Week'+(i+1)+'</div><div class="week-text">'+p+'</div></div>';
    });
    html += '</div>';

    // 14: 1か月後の変化
    html += '<div class="card card-green"><div class="section-title teal">🌱 1か月後の変化</div>';
    s0.after.forEach(function(a){html += '<div style="font-size:13px;color:#304030;padding:3px 0;border-bottom:1px solid #e0f0e8">・'+a+'</div>';});
    html += '<div style="font-size:12px;color:#508060;margin-top:8px">さらに継続すると：'+nD.actions[0]+'を続けることで、睡眠の質も改善されていきます。</div>';
    html += '</div>';

    // 15: ぼたんからの手紙
    html += '<div class="card card-letter"><div class="section-title">💌 ぼたんからの手紙</div>';
    html += '<div class="letter-body">';
    html += s0.personality[0]+'で'+zD.personality[0]+'なあなたへ。<br><br>';
    html += '肌のケアを頑張る前に、脳を安心させることが一番の近道かもしれません🌿<br><br>';
    html += nD.detail+'<br><br>';
    html += '完璧なケアじゃなくていい。続けられることが、一番肌を変えます。<br>';
    html += 'あなたの肌も心も、少しずつやさしく整っていきますように💜';
    html += '</div>';
    html += '<div class="letter-sign">15年美容ナース｜ぼたん 🌸</div></div>';

    // 次のステップ
    html += '<div class="card"><div class="section-title">🎁 次のステップ</div>';
    [{icon:'🌿',title:'ズボラ美容セミナー（無料）',desc:'続けられる美容ルーティンを一緒に作ります'},
     {icon:'🧠',title:'有料セミナー：脳×ズボラ美容',desc:'3,300円（モニター価格）'},
     {icon:'✨',title:'ズボラ巡りプログラム（3ヶ月）',desc:'49,800円〜'}
    ].forEach(function(s){
      html += '<div class="next-row"><div class="next-icon">'+s.icon+'</div><div><div class="next-title">'+s.title+'</div><div class="next-desc">'+s.desc+'</div></div></div>';
    });
    html += '<a href="https://x.gd/NZs7N" target="_blank" class="line-btn">💚 LINEで詳しく聞く →</a></div>';
    html += '<button class="btn-back" onclick="reset()">最初からやり直す</button>';
  }

  c.innerHTML = html;
  window.scrollTo(0,0);
}

function toggleShimi(id) {
  var idx = state.shimis.indexOf(id);
  if(idx>=0) { state.shimis.splice(idx,1); }
  else if(state.shimis.length<2) { state.shimis.push(id); }
  render();
}
function setZubora(id) { state.zubora=id; render(); }
function setNouhi(id) { state.nouhi=id; render(); }
function nextStep() { state.step++; render(); }
function prevStep() { state.step--; render(); }
function reset() { state={step:0,shimis:[],zubora:null,nouhi:null}; render(); }

render();
</script>
</body>
</html>
