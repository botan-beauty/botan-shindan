    if (navigator.share) {
      navigator.share({ title, text, url: window.location.href });
    } else {
      navigator.clipboard.writeText(window.location.href);
      alert("URLをコピーしました！");
    }
  };
  return (
    <button onClick={share} style={{ display: "block", width: "100%", padding: "14px", background: "linear-gradient(135deg,#70b890,#4a9070)", color: "#fff", border: "none", borderRadius: 99, fontSize: 15, fontWeight: 700, cursor: "pointer", marginTop: 12, fontFamily: "sans-serif" }}>

  );

    setQi(0);
    setChecked({});
    setAllChecked({});
    setWinner(null);
    setScreen("question");

    setChecked(prev => ({ ...prev, [idx]: !prev[idx] }));
  };

      setScreen("result");

      setChecked(allChecked[qi + 1] || {});
      setQi(qi + 1);
    }
