<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ご自愛副業診断｜しばたりえ</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{
  min-height:100vh;
  background:linear-gradient(160deg,#fff5f8 0%,#ffeef5 40%,#fff8f2 100%);
  font-family:'Zen Maru Gothic','Noto Serif JP',serif;
  overflow-x:hidden;
  padding-bottom:48px;
}
.petals{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;}
.petal{position:absolute;top:-20px;animation:fall linear infinite;font-size:16px;opacity:0.4;}
@keyframes fall{
  0%{transform:translateY(-20px) rotate(0deg);opacity:0;}
  10%{opacity:0.6;}
  90%{opacity:0.3;}
  100%{transform:translateY(110vh) rotate(360deg);opacity:0;}
}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
@keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.03);}}
.fade-up{animation:fadeUp 0.5s ease both;}
.wrap{position:relative;z-index:1;max-width:520px;margin:0 auto;padding:24px 16px;}

/* HEADER */
.header{text-align:center;margin-bottom:24px;}
.header-badge{
  display:inline-block;
  background:linear-gradient(90deg,#f0789a,#f09878);
  color:white;border-radius:999px;
  padding:6px 20px;font-size:13px;font-weight:700;
  margin-bottom:8px;letter-spacing:.05em;
}
.header-sub{font-size:13px;color:#b07880;margin-bottom:4px;letter-spacing:.08em;}
.title{font-size:26px;font-weight:700;color:#7a2040;line-height:1.4;margin:8px 0 12px;font-family:'Noto Serif JP',serif;}
.title-accent{
  background:linear-gradient(120deg,#e05080,#f0789a,#e08060);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.author-row{display:flex;justify-content:center;}
.author-badge{
  display:flex;align-items:center;gap:10px;
  background:rgba(255,255,255,.8);border-radius:12px;
  padding:8px 16px;border:1px solid #f0c0d0;
}
.author-photo{width:56px;height:56px;border-radius:50%;object-fit:cover;border:2px solid #f0a0c0;box-shadow:0 2px 8px rgba(220,100,140,.25);flex-shrink:0;}
.author-name{font-size:15px;font-weight:700;color:#7a2040;}
.author-sub{font-size:11px;color:#b07880;}

/* CARD */
.card{
  background:rgba(255,255,255,.85);
  backdrop-filter:blur(12px);
  border-radius:24px;border:1px solid #f5c0d0;
  box-shadow:0 8px 40px rgba(220,100,140,.12),0 2px 8px rgba(220,100,140,.08);
  padding:32px 24px;margin-bottom:20px;
}

/* START */
.start-emoji{font-size:48px;margin-bottom:16px;text-align:center;}
.start-text{font-size:16px;color:#7a4050;line-height:1.8;margin-bottom:8px;font-weight:500;text-align:center;}
.start-sub{font-size:13px;color:#b07880;margin-bottom:28px;text-align:center;}
.types-preview{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:8px;}
.type-chip{border-radius:999px;padding:4px 12px;font-size:12px;font-weight:700;}

/* BUTTONS */
.btn-start{
  display:block;width:fit-content;margin:0 auto 24px;
  background:linear-gradient(135deg,#f0789a 0%,#e05070 50%,#f09878 100%);
  color:white;border:none;border-radius:999px;
  padding:16px 48px;font-size:18px;font-weight:700;
  cursor:pointer;transition:all .25s;
  box-shadow:0 6px 20px rgba(220,80,120,.3);
  letter-spacing:.05em;font-family:'Zen Maru Gothic',serif;
  text-decoration:none;
}
.btn-start:hover{transform:translateY(-3px) scale(1.03);box-shadow:0 12px 32px rgba(240,100,140,.4);}
.btn-line{
  display:block;text-align:center;
  background:linear-gradient(135deg,#06C755 0%,#04a844 100%);
  color:white;border:none;border-radius:999px;
  padding:16px 48px;font-size:17px;font-weight:700;
  cursor:pointer;transition:all .25s;
  box-shadow:0 6px 20px rgba(6,199,85,.35);
  letter-spacing:.05em;font-family:'Zen Maru Gothic',serif;
  text-decoration:none;margin-top:24px;
}
.btn-line:hover{transform:translateY(-2px);box-shadow:0 10px 28px rgba(6,199,85,.4);}
.btn-restart{
  display:block;width:fit-content;margin:12px auto 0;
  background:none;border:2px solid #f0a0c0;border-radius:999px;
  padding:12px 32px;font-size:14px;font-weight:700;color:#c07080;
  cursor:pointer;transition:all .25s;font-family:'Zen Maru Gothic',serif;
}
.btn-restart:hover{background:#fff0f5;}

/* QUESTION */
.progress-row{display:flex;align-items:center;gap:12px;margin-bottom:20px;}
.progress-bar{flex:1;height:6px;background:#fdd0e0;border-radius:999px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,#f0789a,#e05070);border-radius:999px;transition:width .4s ease;}
.progress-label{font-size:12px;color:#c07080;font-weight:700;min-width:24px;}
.question-id{
  display:inline-block;
  background:linear-gradient(135deg,#f0789a,#e05070);
  color:white;border-radius:999px;padding:4px 16px;
  font-size:13px;font-weight:700;margin-bottom:16px;
}
.question-text{
  font-size:18px;font-weight:700;color:#5a2030;
  line-height:1.7;margin-bottom:28px;
  font-family:'Noto Serif JP',serif;text-align:center;
}
.answer-col{display:flex;flex-direction:column;gap:12px;}
.btn-yes{
  background:linear-gradient(135deg,#f9c8d8 0%,#f0a0c0 100%);
  color:#7a2040;border:2px solid #f0a0c0;border-radius:16px;
  padding:16px 20px;font-size:15px;font-weight:700;
  cursor:pointer;transition:all .25s;
  display:flex;align-items:center;gap:10px;text-align:left;
  font-family:'Zen Maru Gothic',serif;width:100%;
}
.btn-yes:hover{transform:translateY(-2px) scale(1.02);box-shadow:0 8px 24px rgba(240,120,150,.35);}
.btn-no{
  background:linear-gradient(135deg,#f5e8d8 0%,#e8d0b8 100%);
  color:#7a5040;border:2px solid #e8d0b8;border-radius:16px;
  padding:16px 20px;font-size:15px;font-weight:700;
  cursor:pointer;transition:all .25s;
  display:flex;align-items:center;gap:10px;text-align:left;
  font-family:'Zen Maru Gothic',serif;width:100%;
}
.btn-no:hover{transform:translateY(-2px) scale(1.02);box-shadow:0 8px 24px rgba(180,140,120,.25);}
.btn-icon{font-size:20px;flex-shrink:0;}
.back-btn{
  background:none;border:none;color:#c07080;
  font-size:13px;cursor:pointer;margin-top:20px;
  text-decoration:underline;display:block;
  font-family:'Zen Maru Gothic',serif;
}

/* RESULT */
.result-section{border-radius:16px;padding:8px 0 0;}
.result-badge{
  display:inline-block;
  background:linear-gradient(135deg,#f0789a,#e05070);
  color:white;border-radius:999px;padding:6px 24px;
  font-size:14px;font-weight:700;margin-bottom:12px;
}
.result-emoji{font-size:56px;margin-bottom:8px;text-align:center;}
.result-title{font-size:24px;font-weight:700;margin-bottom:8px;font-family:'Noto Serif JP',serif;}
.result-tagline{font-size:14px;color:#7a5060;margin-bottom:16px;line-height:1.6;}
.divider{height:1px;background:rgba(200,120,140,.2);margin:16px 0;}
.section-label{text-align:left;margin:16px 0 8px;}
.section-badge{display:inline-block;color:white;border-radius:999px;padding:4px 14px;font-size:12px;font-weight:700;}
.points-list{list-style:none;padding:0;margin:0 0 4px;text-align:left;}
.point-item{display:flex;align-items:flex-start;gap:10px;font-size:14px;color:#5a3040;margin-bottom:10px;line-height:1.5;}
.point-dot{color:white;border-radius:999px;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;font-weight:700;}
.demerit-dot{background:#e8b0a0!important;font-size:10px;}
.demerit-text{color:#7a4040!important;}

/* RIE BOX */
.rie-box{border-radius:16px;border:2px solid;overflow:hidden;margin-top:20px;text-align:left;}
.rie-header{display:flex;align-items:center;gap:10px;padding:12px 16px;background:rgba(255,255,255,.7);}
.rie-mini-photo{width:40px;height:40px;border-radius:50%;object-fit:cover;border:2px solid #f0a0c0;flex-shrink:0;}
.rie-name{font-size:13px;font-weight:700;color:#7a2040;}
.rie-role{font-size:10px;color:#b07880;}
.rie-message{padding:14px 16px;}
.rie-text{font-size:13px;color:#5a3040;line-height:1.8;white-space:pre-wrap;}

/* FOOTER */
.footer{text-align:center;font-size:13px;color:#8a5060;line-height:1.8;padding:0 8px;}

/* HIDDEN */
.hidden{display:none!important;}
</style>
</head>

const qMap = Object.fromEntries(questions.map(q=>[q.id,q]));
let currentQ = "Q1";
let history = [];

// Generate petals
(()=>{
  const container = document.getElementById("petals");
  for(let i=0;i<12;i++){
    const p = document.createElement("div");
    p.className = "petal";
    p.textContent = "🌸";
    p.style.left = `${5+((i*8.3)%90)}%`;
    p.style.animationDelay = `${(i*0.7)%5}s`;
    p.style.animationDuration = `${6+(i%4)}s`;
    p.style.fontSize = `${14+(i%10)}px`;
    p.style.opacity = 0.3+(i%5)*0.1;
    container.appendChild(p);
  }
})();

// Generate type chips
(()=>{
  const container = document.getElementById("type-chips");
  const colors = {A:"#F9A8C9",B:"#A8C8F9",C:"#C9A8F9",D:"#F9C8A8",E:"#A8F9C8",F:"#F9E8A8",G:"#A8F9E8"};
  Object.entries(results).forEach(([k,r])=>{
    const chip = document.createElement("span");
    chip.className = "type-chip";
    chip.style.background = colors[k]+"80";
    chip.style.color = "#7a4a5a";
    chip.textContent = r.emoji+" "+r.type;
    container.appendChild(chip);
  });
})();

function show(id){
  ["screen-start","screen-question","screen-result"].forEach(s=>{
    document.getElementById(s).classList.add("hidden");
  });
  document.getElementById(id).classList.remove("hidden");
  document.getElementById(id).classList.add("fade-up");
}

function startQuiz(){
  currentQ = "Q1";
  history = [];
  showQuestion();
}

function showQuestion(){
  show("screen-question");
  const q = qMap[currentQ];
  document.getElementById("question-id").textContent = currentQ;
  document.getElementById("question-text").innerHTML = q.text.replace(/\n/g,"<br>");
  document.getElementById("yes-label").textContent = q.yes.label;
  document.getElementById("no-label").textContent = q.no.label;
  document.getElementById("progress-label").textContent = "Q"+(history.length+1);
  document.getElementById("progress-fill").style.width = Math.min((history.length/5)*100,95)+"%";
  document.getElementById("back-btn").style.display = history.length>0?"block":"none";
}

function answer(choice){
  const q = qMap[currentQ];
  const opt = choice==="yes"?q.yes:q.no;
  history.push(currentQ);
  if(opt.result){
    showResult(opt.result);
  } else {
    currentQ = opt.next;
    showQuestion();
  }
}

function goBack(){
  if(history.length===0) return;
  currentQ = history.pop();
  showQuestion();
}

function showResult(key){
  const r = results[key];
  const accentColor = r.color.replace("F9","D0").replace("A8","70");
  
  let meritsHTML = r.merits.map(m=>`<li class="point-item"><span class="point-dot" style="background:${r.color}">✓</span><span>${m}</span></li>`).join("");
  let demeritsHTML = r.demerits.map(d=>`<li class="point-item"><span class="point-dot demerit-dot">！</span><span class="demerit-text">${d}</span></li>`).join("");

  const html = `
    <div class="result-section fade-up" style="background:${r.bg}">
      <div style="text-align:center;padding-top:8px;">
        <span class="result-badge">${r.type}</span><br>
        <div class="result-emoji">${r.emoji}</div>
        <h2 class="result-title" style="color:${accentColor}">${r.title}</h2>
        <p class="result-tagline">${r.tagline}</p>
      </div>
      <div class="divider"></div>
      <div class="section-label"><span class="section-badge" style="background:${r.color}">✨ メリット</span></div>
      <ul class="points-list">${meritsHTML}</ul>
      <div class="section-label"><span class="section-badge" style="background:#e8c0b0">💡 注意点・デメリット</span></div>
      <ul class="points-list">${demeritsHTML}</ul>
      <div class="rie-box" style="border-color:${r.color}">
        <div class="rie-header">
          <img src="${PHOTO_SRC}" class="rie-mini-photo" alt="りえ">
          <div>
            <div class="rie-name">しばたりえより</div>
            <div class="rie-role">15年美容ナース｜魂のめぐり専門家</div>
          </div>
        </div>
        <div class="rie-message" style="background:${r.color}20">
          <p class="rie-text">${r.rieComment.replace(/\n/g,"\n")}</p>
        </div>
      </div>
      <a href="http://bit.ly/4tKAr7F" target="_blank" rel="noopener noreferrer" class="btn-line">💚 タップして公式LINEへ</a>
      <button class="btn-restart" onclick="startQuiz()">もう一度診断する 🌸</button>
    </div>
  `;
  document.getElementById("screen-result").innerHTML = html;
  show("screen-result");
  window.scrollTo({top:0,behavior:"smooth"});
}
