    ))}
    {[...Array(10)].map((_, i) => (
      <div key={"k"+i} style={{
        position: "absolute",
        left: `${(i * 11 + 5) % 90}%`,
        top: `${(i * 17 + 8) % 85}%`,
        fontSize: `${10 + (i % 6)}px`,
        animation: `sparkle ${2 + (i % 3)}s ${(i * 0.5) % 3}s ease-in-out infinite`,
      }}>{i % 2 === 0 ? "✨" : "💫"}</div>
    ))}
  </div>
);

const optColors = [
  { bg: "#f0e8ff", border: "#d0b0f0", color: "#4a2070" },
  { bg: "#e8f8f0", border: "#a0d8b8", color: "#204a30" },
  { bg: "#ffe8f5", border: "#f0b0d0", color: "#602040" },
  { bg: "#e8eeff", border: "#b0c0e8", color: "#203060" },
];

const ShareButton = ({ title, text }) => {
  const share = () => {
    if (navigator.share) {
      navigator.share({ title, text, url: window.location.href });
    } else {
      navigator.clipboard.writeText(window.location.href);
      alert("URLをコピーしました！");
    }
  };
  return (
    <button onClick={share} style={{ display: "block", width: "100%", padding: "14px", background: "linear-gradient(135deg,#f0789a,#e05070)", color: "#fff", border: "none", borderRadius: 99, fontSize: 15, fontWeight: 700, cursor: "pointer", marginTop: 12, fontFamily: "sans-serif" }}>
      📤 結果をシェアする
    </button>
  );
};

function App() {
  const [screen, setScreen] = React.useState("start");
  const [qi, setQi] = React.useState(0);
  const [scores, setScores] = React.useState({ A: 0, B: 0, C: 0, D: 0 });
  const [history, setHistory] = React.useState([]);
  const [winner, setWinner] = React.useState(null);

  const startQuiz = () => {
    setScores({ A: 0, B: 0, C: 0, D: 0 });
    setHistory([]);
    setQi(0);
    setScreen("question");
  };

  const pick = (type) => {
    const newScores = { ...scores, [type]: scores[type] + 1 };
    setHistory([...history, { qi, scores: { ...scores } }]);
    setScores(newScores);
    if (qi + 1 >= questions.length) {
      const w = Object.entries(newScores).sort((a, b) => b[1] - a[1])[0][0];
      setWinner(w);
      setScreen("result");
    } else {
      setQi(qi + 1);
    }
  };

  const goBack = () => {
    if (history.length === 0) { setScreen("start"); return; }
    const last = history[history.length - 1];
    setHistory(history.slice(0, -1));
    setQi(last.qi);
    setScores(last.scores);
  };

  const q = questions[qi];
  const r = winner ? results[winner] : null;

  return (
    <div style={{ background: "#f8f5ff", position: "relative", minHeight: "100vh", padding: "16px", fontFamily: "sans-serif" }}>
      <StarsAndSparkle />
      <div style={{ position: "relative", zIndex: 1, maxWidth: 480, margin: "0 auto" }}>

        {/* ヘッダー */}
        <div style={{ textAlign: "center", marginBottom: 12 }}>
          <div style={{ display: "inline-block", background: "linear-gradient(90deg,#b07acc,#c87aaa)", color: "#fff", borderRadius: 99, padding: "6px 18px", fontSize: 13, fontWeight: 700, marginBottom: 8 }}>夏前に知らないと損する美容 🌸</div>
          <div style={{ fontSize: 12, color: "#8060a0", marginBottom: 4 }}>15年美容ナースが教える</div>
          <h1 style={{ fontSize: 22, color: "#4a2070", lineHeight: 1.4, margin: "8px 0" }}>あなたの<br />「ズボラ美容タイプ」診断</h1>
        </div>

        {/* プロフィール */}
        <div style={{ display: "flex", alignItems: "center", gap: 12, background: "#fff", borderRadius: 12, padding: "10px 16px", border: "1px solid #d0b0e8", marginBottom: 16 }}>
          <img src={PHOTO} alt="ぼたん" style={{ width: 50, height: 50, borderRadius: "50%", objectFit: "cover", border: "2px solid #c8a0e0" }} />
          <div>
            <div style={{ fontSize: 15, fontWeight: 700, color: "#4a2070" }}>ぼたん</div>
            <div style={{ fontSize: 11, color: "#9070b0" }}>15年美容ナース｜魂のめぐり専門家</div>
          </div>
        </div>

        {/* カード */}
        <div style={{ background: "#fff", borderRadius: 16, padding: 24, marginBottom: 16, border: "1px solid #d8c0f0" }}>

          {/* スタート */}
          {screen === "start" && (
            <div style={{ textAlign: "center" }}>
              <div style={{ fontSize: 44, marginBottom: 12 }}>✨</div>
              <p style={{ fontSize: 16, color: "#5a3070", lineHeight: 1.8, fontWeight: 500 }}>そのケア、もっと「ズボラ」で<br />良くないですか？🌿</p>
              <p style={{ fontSize: 13, color: "#9070b0", margin: "8px 0 20px" }}>全7問｜所要時間 約1分</p>
              <button onClick={startQuiz} style={{ display: "block", width: "100%", padding: 16, background: "linear-gradient(135deg,#b07acc,#8050c0)", color: "#fff", border: "none", borderRadius: 99, fontSize: 18, fontWeight: 700, cursor: "pointer", marginBottom: 16 }}>
                診断スタート！ →
              </button>
              <div style={{ display: "flex", flexWrap: "wrap", gap: 8, justifyContent: "center" }}>
                {[["🟣 頑張りすぎ疲労","#e8d0f8","#4a2070"],["🟢 省エネ","#d0f0e0","#205040"],["🩷 自己否定","#f8d0e8","#702050"],["🌙 エネルギー切れ","#d0d8f0","#203060"]].map(([label, bg, color]) => (
                  <span key={label} style={{ background: bg, color, borderRadius: 99, padding: "4px 12px", fontSize: 12, fontWeight: 700 }}>{label}</span>
                ))}
              </div>
            </div>
          )}

          {/* 質問 */}
          {screen === "question" && (
            <div>
              <div style={{ height: 6, background: "#e0d0f5", borderRadius: 99, marginBottom: 16, overflow: "hidden" }}>
                <div style={{ height: "100%", width: `${(qi / questions.length) * 100}%`, background: "#b07acc", borderRadius: 99, transition: "width .3s" }} />
              </div>
              <div style={{ textAlign: "center", fontSize: 13, color: "#9070b0", marginBottom: 8 }}>{qi + 1} / {questions.length}</div>
              <div style={{ fontSize: 16, fontWeight: 700, color: "#3a2060", textAlign: "center", marginBottom: 20, lineHeight: 1.6 }}>
                {q.text.split("\n").map((line, i) => <span key={i}>{line}{i < q.text.split("\n").length - 1 && <br />}</span>)}
              </div>
              <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                {q.options.map((opt, i) => (
                  <button key={i} onClick={() => pick(opt.type)} style={{ display: "flex", alignItems: "center", gap: 10, width: "100%", padding: "14px 16px", borderRadius: 12, fontSize: 14, fontWeight: 700, cursor: "pointer", textAlign: "left", border: `2px solid ${optColors[i].border}`, background: optColors[i].bg, color: optColors[i].color }}>
                    <span style={{ fontSize: 18 }}>{opt.icon}</span>
                    <span>{opt.label}</span>
                  </button>
                ))}
              </div>
              {history.length > 0 && (
                <button onClick={goBack} style={{ background: "none", border: "none", color: "#9070b0", fontSize: 13, cursor: "pointer", textDecoration: "underline", marginTop: 12 }}>← 前の質問に戻る</button>
              )}
            </div>
          )}

          {/* 結果 */}
          {screen === "result" && r && (
            <div style={{ background: r.bg, borderRadius: 16, padding: 20 }}>
              <div style={{ textAlign: "center" }}>
                <div style={{ display: "inline-block", background: "linear-gradient(135deg,#b07acc,#8050c0)", color: "#fff", borderRadius: 99, padding: "5px 20px", fontSize: 13, fontWeight: 700, marginBottom: 8 }}>診断結果</div>
                <div style={{ fontSize: 52, margin: "8px 0" }}>{r.emoji}</div>
                <div style={{ fontSize: 20, fontWeight: 700, color: r.color, marginBottom: 6 }}>{r.title}</div>
                <div style={{ fontSize: 13, color: "#5a3070", marginBottom: 12, lineHeight: 1.6 }}>{r.tag}</div>
              </div>
              <div style={{ height: 1, background: "rgba(160,100,200,.2)", margin: "12px 0" }} />
              <div style={{ fontSize: 12, fontWeight: 700, color: r.color, marginBottom: 8 }}>💡 あなたの特徴</div>
              {r.traits.map((t, i) => <div key={i} style={{ fontSize: 14, color: "#4a2070", marginBottom: 8, paddingLeft: 4 }}>✓ {t}</div>)}
              <div style={{ borderRadius: 12, padding: 14, margin: "12px 0", border: `2px solid ${r.color}`, background: r.color + "22" }}>
                <div style={{ fontSize: 13, fontWeight: 700, color: r.color, marginBottom: 6 }}>{r.needT}</div>
                <div style={{ fontSize: 13, lineHeight: 1.7, color: "#5a3070" }}>{r.needD}</div>
              </div>
              <div style={{ borderRadius: 12, border: `2px solid ${r.color}`, overflow: "hidden", marginTop: 12 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 10, padding: "10px 14px", background: "rgba(255,255,255,.8)" }}>
                  <img src={PHOTO} alt="ぼたん" style={{ width: 36, height: 36, borderRadius: "50%", objectFit: "cover", border: "2px solid #c8a0e0" }} />
                  <div>
                    <div style={{ fontSize: 13, fontWeight: 700, color: "#4a2070" }}>ぼたんより</div>
                    <div style={{ fontSize: 10, color: "#9070b0" }}>15年美容ナース｜魂のめぐり専門家</div>
                  </div>
                </div>
                <div style={{ padding: "12px 14px", background: r.color + "18" }}>
                  <div style={{ fontSize: 13, lineHeight: 1.8, color: "#3a2060", whiteSpace: "pre-wrap" }}>{r.msg}</div>
                </div>
              </div>
              <a href="https://x.gd/NZs7N" target="_blank" rel="noopener noreferrer" style={{ display: "block", textAlign: "center", background: "#06C755", color: "#fff", borderRadius: 99, padding: 15, fontSize: 16, fontWeight: 700, textDecoration: "none", margin: "16px 0" }}>💚 タップして公式LINEへ</a>
              <ShareButton title={`私は「${r.title}」でした！`} text={`ズボラ美容タイプ診断で「${r.title}」と診断されました！${r.tag}`} />
              <button onClick={startQuiz} style={{ display: "block", width: "100%", textAlign: "center", background: "none", border: "2px solid #c8a0e0", borderRadius: 99, padding: 10, fontSize: 13, color: "#9070b0", cursor: "pointer", marginTop: 12 }}>もう一度診断する 🌿</button>
            </div>
          )}
        </div>

        <div style={{ textAlign: "center", fontSize: 13, color: "#705080", lineHeight: 1.8 }}>
          <span style={{ color: "#9a7acc", fontWeight: 700 }}>Point </span>
          完璧なケアより、<span style={{ color: "#9a7acc" }}>あなたに合ったズボラ美容</span>が続く美肌の近道🌿
        </div>
      </div>
    </div>
  );
}

ReactDOM.render(React.createElement(App), document.getElementById("root"));
</script>
</body>
</html>
