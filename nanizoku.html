<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>あなたは何族？診断🌙</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;background:linear-gradient(160deg,#100626 0%,#24124a 35%,#3e1e6c 65%,#1c0840 100%);font-family:"Hiragino Maru Gothic Pro","BIZ UDPGothic","Yu Gothic",sans-serif;display:flex;align-items:flex-start;justify-content:center;padding:20px;position:relative;overflow-x:hidden}
#stars{position:fixed;inset:0;pointer-events:none;z-index:0}
.star{position:absolute;border-radius:50%;background:white;animation:twinkle var(--d) ease-in-out infinite}
@keyframes twinkle{0%,100%{opacity:.15}50%{opacity:.85}}
#app{width:100%;max-width:440px;z-index:1;transition:opacity .3s,transform .3s}
#app.fade{opacity:0;transform:translateY(12px)}
.card{background:rgba(255,255,255,.97);border-radius:28px;padding:30px 26px;box-shadow:0 28px 80px rgba(0,0,0,.5)}
.avatar{width:100px;height:100px;border-radius:50%;overflow:hidden;margin:0 auto 14px;border:3px solid #c090e8;box-shadow:0 4px 20px rgba(140,60,220,.4)}
.avatar img,.mini-avatar img{width:100%;height:100%;object-fit:cover;object-position:center top}
.mini-avatar{width:38px;height:38px;border-radius:50%;overflow:hidden;border:2px solid #c090e8;flex-shrink:0}
h1{font-size:2rem;font-weight:800;color:#2a1050;line-height:1.2;text-align:center;margin-bottom:4px}
h1 span{color:#7030b8}
.subtitle{color:#9878b8;font-size:.78rem;text-align:center;margin-bottom:20px}
.intro-box{background:linear-gradient(135deg,#f8f0ff,#fff3f8);border-radius:18px;padding:16px 18px;margin-bottom:26px;border:1.5px solid #e8d8f8}
.intro-box p{color:#6848a0;font-size:.82rem;line-height:2}
.btn-main{width:100%;background:linear-gradient(135deg,#5828a0,#8840c8);color:white;border:none;border-radius:50px;padding:16px;font-size:1.05rem;font-weight:800;cursor:pointer;font-family:inherit;box-shadow:0 8px 28px rgba(88,40,160,.5);transition:transform .2s}
.btn-main:hover{transform:scale(1.04)}
.btn-line{width:100%;background:linear-gradient(135deg,#06c755,#00a040);color:white;border:none;border-radius:50px;padding:15px;font-size:1rem;font-weight:800;cursor:pointer;font-family:inherit;box-shadow:0 6px 20px rgba(6,199,85,.4);text-decoration:none;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:10px}
.btn-share{width:100%;background:linear-gradient(135deg,#c03878,#e06090);color:white;border:none;border-radius:50px;padding:14px;font-size:.95rem;font-weight:800;cursor:pointer;font-family:inherit;box-shadow:0 6px 20px rgba(180,40,100,.35);margin-bottom:10px;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-retry{width:100%;background:rgba(255,255,255,.12);color:#d0c0f0;border:1.5px solid rgba(200,180,255,.3);border-radius:50px;padding:13px;font-size:.9rem;font-weight:700;cursor:pointer;font-family:inherit}
.hint-note{color:#bbb;font-size:.72rem;text-align:center;margin-top:14px}
.progress{display:flex;gap:6px;justify-content:center;margin-bottom:24px}
.dot{height:8px;border-radius:4px;transition:all .3s ease;background:#e0d0f0}
.dot.done{background:#8040c0}.dot.active{background:#9858d8;width:28px!important}
.q-emoji{font-size:38px;text-align:center;margin-bottom:8px}
.q-num{color:#b098c8;font-size:.76rem;text-align:center;margin-bottom:6px}
.q-text{font-size:1.2rem;font-weight:800;color:#200840;line-height:1.55;text-align:center;margin-bottom:22px}
.opts{display:flex;flex-direction:column;gap:10px}
.opt{background:linear-gradient(135deg,#faf8ff,#f5eefd);border:2px solid #e4d4f8;border-radius:16px;padding:14px 18px;text-align:left;font-size:.9rem;color:#38185a;cursor:pointer;font-family:inherit;font-weight:600;transition:all .2s ease;line-height:1.45}
.opt:hover{background:linear-gradient(135deg,#ece0ff,#e4d4ff);border-color:#a878e8;transform:translateY(-3px);box-shadow:0 6px 18px rgba(120,60,200,.15)}
.calc-emoji{font-size:52px;display:block;text-align:center;margin-bottom:16px;animation:spin 3s linear infinite}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.result-header{text-align:center;margin-bottom:20px}
.result-title{font-size:1.2rem;font-weight:800;color:#200840;line-height:1.4}
.result-sub{color:#9070b8;font-size:.74rem;margin-top:3px}
.top-card{border-radius:20px;padding:18px 16px;margin-bottom:12px;position:relative;overflow:hidden}
.top-badge{position:absolute;top:10px;right:10px;color:white;font-size:.65rem;padding:3px 10px;border-radius:10px;font-weight:800}
.top-inner{display:flex;gap:12px;align-items:flex-start;margin-bottom:10px}
.char-img-big{width:80px;height:90px;border-radius:14px;overflow:hidden;flex-shrink:0}
.char-img-big img{width:100%;height:100%;object-fit:cover;object-position:center top}
.tribe-name{font-weight:800;font-size:1.1rem;margin-bottom:2px}
.tribe-catch{color:#a090b8;font-size:.7rem;font-style:italic;margin-bottom:8px}
.bar-wrap{background:#e8e0f0;border-radius:4px;height:7px}
.bar-fill{height:100%;border-radius:4px}
.bar-status{color:#a090b8;font-size:.66rem;margin-top:3px}
.top-desc{background:rgba(255,255,255,.65);border-radius:12px;padding:10px 12px;margin-bottom:10px;font-size:.8rem;color:#5a4070;line-height:1.75}
.top-hint{font-size:.76rem;font-weight:700;background:white;border-radius:10px;padding:8px 12px}
.rest-label{color:#9070a8;font-size:.72rem;font-weight:700;margin-bottom:8px}
.rest-list{display:flex;flex-direction:column;gap:8px;margin-bottom:14px}
.rest-card{border-radius:14px;padding:12px 14px;display:flex;align-items:center;gap:10px}
.char-img-sm{width:48px;height:54px;border-radius:10px;overflow:hidden;flex-shrink:0}
.char-img-sm img{width:100%;height:100%;object-fit:cover;object-position:center top}
.rest-name{font-weight:800;font-size:.88rem}
.rest-status{font-size:.66rem;color:#b098c8}
.botan-msg{background:linear-gradient(135deg,#f0e8ff,#ffe8f8);border-radius:18px;padding:16px;margin-bottom:18px;border:2px solid #d8b8f0}
.botan-header{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.botan-from{color:#6838a0;font-size:.78rem;font-weight:800}
.msg-text{color:#6848a0;font-size:.78rem;line-height:1.85}
.msg-ok{color:#8040c0;font-size:.86rem;font-weight:800;margin-top:10px;text-align:center}
.screenshot-box{background:#fff8fc;border:1.5px solid #f0c0d8;border-radius:16px;padding:14px 16px;margin-bottom:10px;font-size:.78rem;color:#5a3050;line-height:1.9;display:none}
.screenshot-box.open{display:block}
.close-btn{background:none;border:none;color:#a080b0;font-size:.75rem;cursor:pointer;font-family:inherit;margin-top:6px;padding:0;text-decoration:underline}
.hash{color:#9060a0;font-weight:700}
</style>
</head>

  var rest=results.slice(1);

  var topCard=top?'<div class="top-card" style="background:'+top.bg+';border:2px solid '+top.border+'"><div class="top-badge" style="background:'+top.color+'">本日暴走中🤣</div><div class="top-inner"><div class="char-img-big" style="border:2px solid '+top.border+'"><img src="'+CHARS[top.id]+'"></div><div style="flex:1;padding-top:4px"><p class="tribe-name" style="color:'+top.color+'">'+top.emoji+' '+top.name+'</p><p class="tribe-catch">'+top.catch+'</p><div class="bar-wrap"><div class="bar-fill" style="background:'+top.color+';width:'+Math.round(top.score/maxScore*100)+'%"></div></div><p class="bar-status">'+top.status+'</p></div></div><div class="top-desc">'+top.desc+'</div><p class="top-hint" style="color:'+top.color+';border:1px solid '+top.border+'">🌙 '+top.hint+'</p></div>':'';

  var restCards=rest.length?'<p class="rest-label">ほかにも出てた族🤣</p><div class="rest-list">'+rest.map(function(t){return '<div class="rest-card" style="background:'+t.bg+';border:1.5px solid '+t.border+'"><div class="char-img-sm" style="border:1.5px solid '+t.border+'"><img src="'+CHARS[t.id]+'"></div><div style="flex:1"><div style="display:flex;align-items:center;justify-content:space-between"><p class="rest-name" style="color:'+t.color+'">'+t.emoji+' '+t.name+'</p><span class="rest-status">'+t.status+'</span></div><div class="bar-wrap" style="margin-top:5px"><div class="bar-fill" style="background:'+t.color+';width:'+Math.round(t.score/maxScore*100)+'%"></div></div></div></div>';}).join('')+'</div>':'';

  app.innerHTML='<div class="card"><div class="result-header"><p style="font-size:32px;margin-bottom:6px">🌙</p><p class="result-title">本日の脳内会議メンバー🤣</p><p class="result-sub">今日は'+results.length+'族が出てたで💜</p></div>'+topCard+restCards+'<div class="botan-msg"><div class="botan-header"><div class="mini-avatar"><img src="'+BOTAN+'"></div><p class="botan-from">エージェントぼたんより🌙</p></div><p class="msg-text">どの族が出ても、<br>それ全部あなたの中にあるもの🥺<br>脳の力みや脳疲労が関係してることも🌙<br>頑張れないんじゃない。<br>脳タイプに合ってないだけかもしれんよ🌿</p><p class="msg-ok">全部あなたの大事な一部。<br>まるっとOKなんよ💜</p></div><a href="'+LINE_URL+'" target="_blank" class="btn-line">💚 タップして公式LINEへ</a><button class="btn-share" onclick="toggleSS()">📸 結果をスクショしてシェアする</button><div id="ss-box" class="screenshot-box"><p style="font-weight:800;margin-bottom:8px">📱 スクショの撮り方</p><p>iPhone：サイドボタン＋音量UPボタンを同時押し📸</p><p>Android：電源ボタン＋音量DOWNボタンを同時押し📸</p><p style="margin-top:8px">撮ったスクショをInstagramやFacebookに貼ってシェアしてね🌙<br><span class="hash">#何族診断 #ぼたん</span></p><button class="close-btn" onclick="toggleSS()">閉じる</button></div><button class="btn-retry" onclick="startQuiz()">もう一回やる🤣🌙</button></div>';
}

function toggleSS(){var b=document.getElementById("ss-box");if(b)b.classList.toggle("open");}

renderIntro();
</script>
