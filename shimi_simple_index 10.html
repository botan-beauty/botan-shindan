    90% { opacity: 0.3; }
    100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
  }
`;

const Sakura = () => (
  <div style={{ position: "fixed", top: 0, left: 0, width: "100%", height: "100%", pointerEvents: "none", zIndex: 0, overflow: "hidden" }}>
    <style>{animStyles}</style>
    {[...Array(10)].map((_, i) => (
      <div key={i} style={{
        position: "absolute", top: "-20px",
        left: `${5 + ((i * 9.3) % 90)}%`,
        fontSize: `${13 + (i % 8)}px`,
        opacity: 0.4,
        animation: `fall ${6 + (i % 4)}s ${(i * 0.7) % 5}s linear infinite`,
      }}>🌸</div>
    ))}
  </div>
);

const ScreenshotGuide = () => {
  const [show, setShow] = React.useState(false);
  return (
    <>
      <button onClick={() => setShow(!show)} style={{ display: "block", width: "100%", padding: 14, background: "linear-gradient(135deg,#f0789a,#e05070)", color: "#fff", border: "none", borderRadius: 99, fontSize: 15, fontWeight: 700, cursor: "pointer", marginBottom: 12, fontFamily: "sans-serif" }}>
        📸 結果をスクショしてシェアする
      </button>
      {show && (
        <div style={{ background: "#fff8fb", border: "2px solid #f0a0c0", borderRadius: 12, padding: 16, marginBottom: 12 }}>
          <div style={{ fontSize: 14, fontWeight: 700, color: "#c05070", marginBottom: 8 }}>📱 スクショの撮り方</div>
          <div style={{ fontSize: 13, color: "#5a2030", lineHeight: 1.8 }}>
            iPhone：サイドボタン＋音量UPボタンを同時押し📸<br />
            Android：電源ボタン＋音量DOWNボタンを同時押し📸<br /><br />
            撮ったスクショをFacebook・Instagramに貼ってシェアしてね🌸
          </div>
          <button onClick={() => setShow(false)} style={{ background: "none", border: "none", color: "#b07080", fontSize: 13, cursor: "pointer", marginTop: 8, textDecoration: "underline" }}>閉じる</button>
        </div>
      )}
    </>
  );
};

function App() {
  const [screen, setScreen] = React.useState("start");
  const [qi, setQi] = React.useState(0);
  const [checked, setChecked] = React.useState({});
  const [allChecked, setAllChecked] = React.useState({});
  const [winner, setWinner] = React.useState(null);

  const startQuiz = () => {
    setQi(0); setChecked({}); setAllChecked({}); setWinner(null);
    setScreen("question");
  };

  const toggleCheck = (idx) => setChecked(prev => ({ ...prev, [idx]: !prev[idx] }));

  const nextQuestion = () => {
    const newAll = { ...allChecked, [qi]: checked };
    setAllChecked(newAll);
    if (qi + 1 >= questions.length) {
      const counts = {};
      questions.forEach((q, i) => {
        const c = newAll[i] ? Object.values(newAll[i]).filter(Boolean).length : 0;
        counts[q.type] = (counts[q.type] || 0) + c;
      });
      const w = Object.entries(counts).sort((a, b) => b[1] - a[1])[0][0];
      setWinner(w);
      setScreen("result");
    } else {
      setChecked(allChecked[qi + 1] || {});
      setQi(qi + 1);
    }
  };

  const goBack = () => {
    if (qi === 0) { setScreen("start"); return; }
    setChecked(allChecked[qi - 1] || {});
    setQi(qi - 1);
  };

  const q = questions[qi];
  const r = winner ? results[winner] : null;

  return (
    <div style={{ background: "#fff8f5", minHeight: "100vh", padding: "16px", fontFamily: "sans-serif", position: "relative" }}>
      <Sakura />
      <div style={{ position: "relative", zIndex: 1, maxWidth: 480, margin: "0 auto" }}>

        <div style={{ textAlign: "center", marginBottom: 12 }}>
          <div style={{ display: "inline-block", background: "linear-gradient(90deg,#e07aaa,#f09878)", color: "#fff", borderRadius: 99, padding: "6px 18px", fontSize: 13, fontWeight: 700, marginBottom: 8 }}>夏前に知らないと損するシミ対策 ☀️</div>
          <div style={{ fontSize: 12, color: "#a06070", marginBottom: 4 }}>15年美容ナースが教える</div>
          <h1 style={{ fontSize: 22, color: "#6a2040", lineHeight: 1.4, margin: "8px 0" }}>あなたの<br />「シミ・くすみタイプ」簡易診断</h1>
        </div>

        <div style={{ display: "flex", alignItems: "center", gap: 12, background: "#fff", borderRadius: 12, padding: "10px 16px", border: "1px solid #f0c8d8", marginBottom: 16 }}>
          <img src={PHOTO} alt="ぼたん" style={{ width: 50, height: 50, borderRadius: "50%", objectFit: "cover", border: "2px solid #f0a0c0" }} />
          <div>
            <div style={{ fontSize: 15, fontWeight: 700, color: "#6a2040" }}>ぼたん</div>
            <div style={{ fontSize: 11, color: "#b07880" }}>15年美容ナース｜魂のめぐり専門家</div>
          </div>
        </div>

        <div style={{ background: "#fff", borderRadius: 16, padding: 24, marginBottom: 16, border: "1px solid #f5c8d8" }}>

          {screen === "start" && (
            <div style={{ textAlign: "center" }}>
              <div style={{ fontSize: 44, marginBottom: 12 }}>🔍</div>
              <p style={{ fontSize: 16, color: "#7a3050", lineHeight: 1.8, fontWeight: 500 }}>そのシミ、全部同じだと<br />思っていませんか？🌸</p>
              <p style={{ fontSize: 13, color: "#b07880", margin: "8px 0 20px", lineHeight: 1.7 }}>種類によってケアを間違えると悪化することも。<br />全8問｜所要時間 約2分</p>
              <button onClick={startQuiz} style={{ display: "block", width: "100%", padding: 16, background: "linear-gradient(135deg,#e07aaa,#c05070,#f09878)", color: "#fff", border: "none", borderRadius: 99, fontSize: 18, fontWeight: 700, cursor: "pointer", marginBottom: 16 }}>
                無料で簡易診断スタート！ →
              </button>
            </div>
          )}

          {screen === "question" && (
            <div>
              <div style={{ height: 6, background: "#fdd0e0", borderRadius: 99, marginBottom: 16, overflow: "hidden" }}>
                <div style={{ height: "100%", width: `${(qi / questions.length) * 100}%`, background: "linear-gradient(90deg,#e07aaa,#c05070)", borderRadius: 99, transition: "width .3s" }} />
              </div>
              <div style={{ textAlign: "center", fontSize: 13, color: "#c07080", marginBottom: 8 }}>{qi + 1} / {questions.length}</div>
              <div style={{ fontSize: 15, fontWeight: 700, color: "#5a2030", textAlign: "center", marginBottom: 6, lineHeight: 1.6 }}>{q.title}</div>
              <div style={{ fontSize: 12, color: "#b07880", textAlign: "center", marginBottom: 16 }}>✅ 当てはまるものをチェックしてね</div>
              <div style={{ display: "flex", flexDirection: "column", gap: 8, marginBottom: 20 }}>
                {q.items.map((item, i) => (
                  <div key={i} onClick={() => toggleCheck(i)} style={{ display: "flex", alignItems: "center", gap: 12, padding: "12px 16px", borderRadius: 12, border: checked[i] ? "2px solid #e07aaa" : "2px solid #f0c8d8", background: checked[i] ? "#ffe0ee" : "#fff8fb", cursor: "pointer" }}>
                    <div style={{ width: 22, height: 22, borderRadius: 6, border: "2px solid #e07aaa", background: checked[i] ? "#e07aaa" : "white", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, color: "white", fontSize: 14, fontWeight: 700 }}>{checked[i] ? "✓" : ""}</div>
                    <span style={{ fontSize: 14, color: "#5a2030" }}>{item}</span>
                  </div>
                ))}
              </div>
              <button onClick={nextQuestion} style={{ display: "block", width: "100%", padding: 14, background: "linear-gradient(135deg,#e07aaa,#c05070)", color: "#fff", border: "none", borderRadius: 99, fontSize: 16, fontWeight: 700, cursor: "pointer", marginBottom: 12 }}>
                次へ →
              </button>
              <button onClick={goBack} style={{ background: "none", border: "none", color: "#c07080", fontSize: 13, cursor: "pointer", textDecoration: "underline", display: "block" }}>← 前の質問に戻る</button>
            </div>
          )}

          {screen === "result" && r && (
            <div style={{ background: r.bg, borderRadius: 16, padding: 20 }}>
              <div style={{ textAlign: "center" }}>
                <div style={{ display: "inline-block", background: "linear-gradient(135deg,#e07aaa,#c05070)", color: "#fff", borderRadius: 99, padding: "5px 20px", fontSize: 13, fontWeight: 700, marginBottom: 8 }}>簡易診断結果</div>
                <div style={{ fontSize: 52, margin: "8px 0" }}>{r.emoji}</div>
                <div style={{ fontSize: 22, fontWeight: 700, color: r.color, marginBottom: 6 }}>{r.title}</div>
                <div style={{ fontSize: 14, color: "#7a3050", marginBottom: 16, lineHeight: 1.6, fontWeight: 500 }}>{r.tag}</div>
              </div>

              <div style={{ height: 1, background: "rgba(220,100,140,.2)", margin: "12px 0" }} />

              {/* 特徴・注意点 */}
              <div style={{ borderRadius: 12, padding: 16, marginBottom: 16, border: `2px solid ${r.color}`, background: r.color + "15" }}>
                <div style={{ fontSize: 13, fontWeight: 700, color: r.color, marginBottom: 8 }}>⚠️ 特徴・注意点</div>
                <div style={{ fontSize: 14, lineHeight: 1.8, color: "#5a2030", whiteSpace: "pre-wrap" }}>{r.warning}</div>
              </div>

              {/* 保存・シェアボタン */}
              <ScreenshotGuide />
              <button onClick={() => {
                const text = "🌸 私は「" + r.title + "」でした！\n\n" + r.tag + "\n\nあなたも無料で簡易版診断してみて✨\n👇\nhttps://SIMPLE_URL\n\n詳しい解説はLINEで受け取れます💚\nhttps://x.gd/NZs7N";
                if (navigator.share) {
                  navigator.share({ title: "シミ・くすみタイプ診断", text });
                } else {
                  navigator.clipboard.writeText(text);
                  alert("テキストをコピーしました！");
                }
              }} style={{ display: "block", width: "100%", padding: 14, background: "linear-gradient(135deg,#b07acc,#8050c0)", color: "#fff", border: "none", borderRadius: 99, fontSize: 15, fontWeight: 700, cursor: "pointer", marginBottom: 16, fontFamily: "sans-serif" }}>
                📤 結果をシェアする
              </button>

              {/* LINEへの誘導 */}
              <div style={{ borderRadius: 16, padding: 20, background: "linear-gradient(135deg,#fff0f8,#fff8f0)", border: "2px solid #f0c0d8", textAlign: "center", marginBottom: 16 }}>
                <div style={{ fontSize: 20, marginBottom: 8 }}>🎁</div>
                <div style={{ fontSize: 15, fontWeight: 700, color: "#6a2040", marginBottom: 8 }}>詳しい診断結果を無料プレゼント中！</div>
                <div style={{ fontSize: 13, color: "#a06070", marginBottom: 16, lineHeight: 1.7, whiteSpace: "pre-wrap" }}>{r.hint}</div>
                <a href="https://x.gd/NZs7N" target="_blank" rel="noopener noreferrer" style={{ display: "block", textAlign: "center", background: "#06C755", color: "#fff", borderRadius: 99, padding: 16, fontSize: 16, fontWeight: 700, textDecoration: "none" }}>
                  🎁 LINEに登録して詳しい解説を受け取る
                </a>
              </div>

              <div style={{ display: "flex", alignItems: "center", gap: 10, background: "rgba(255,255,255,.8)", borderRadius: 12, padding: "10px 14px", border: `1px solid ${r.color}`, marginBottom: 16 }}>
                <img src={PHOTO} alt="ぼたん" style={{ width: 36, height: 36, borderRadius: "50%", objectFit: "cover", border: "2px solid #f0a0c0" }} />
                <div style={{ fontSize: 13, color: "#5a2030", lineHeight: 1.6 }}>
                  <span style={{ fontWeight: 700, color: r.color }}>ぼたんより🌸</span><br />
                  正しいタイプを知ることが、一番の近道。LINEでお待ちしています💚
                </div>
              </div>

              <button onClick={startQuiz} style={{ display: "block", width: "100%", textAlign: "center", background: "none", border: "2px solid #f0a0c0", borderRadius: 99, padding: 10, fontSize: 13, color: "#b07080", cursor: "pointer" }}>もう一度診断する 🌸</button>
            </div>
          )}
        </div>

        <div style={{ textAlign: "center", fontSize: 13, color: "#8a5060", lineHeight: 1.8 }}>
          <span style={{ color: "#e07aaa", fontWeight: 700 }}>Point </span>
          シミのタイプを知ることが、<span style={{ color: "#e07aaa" }}>正しいケアの第一歩</span>🌸
        </div>
      </div>
    </div>
  );
}

ReactDOM.render(React.createElement(App), document.getElementById("root"));
</script>
</body>
</html>
